name: Fetch PurpleAir data

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:           # manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch PurpleAir sensors + 72h history
        env:
          PURPLEAIR_API_KEY: ${{ secrets.PURPLEAIR_API_KEY }}
        run: python3 scripts/fetch_purpleair.py

      - name: Push data/purpleair.json via GitHub API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'data/purpleair.json';
            const content = fs.readFileSync(path, 'utf8');
            const base64 = Buffer.from(content).toString('base64');
            let sha;
            try {
              const existing = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
              });
              sha = existing.data.sha;
            } catch (error) {
              if (error.status === 404) {
                sha = undefined;
              } else {
                throw error;
              }
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'chore: update PurpleAir data [skip ci]',
              content: base64,
              sha,
            });
