name: Fetch PurpleAir data

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:           # manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch PurpleAir sensors (course corridor)
        env:
          PURPLEAIR_API_KEY: ${{ secrets.PURPLEAIR_API_KEY }}
        run: |
          # Bounding box covers Silverton / Lake City / Ouray / Telluride / Ophir + padding
          curl -sf \
            -H "X-API-Key: $PURPLEAIR_API_KEY" \
            "https://api.purpleair.com/v1/sensors?fields=name%2Clatitude%2Clongitude%2Cpm2.5_atm%2Cpm2.5_atm_a%2Cpm2.5_atm_b%2Chumidity%2Ctemperature%2Clast_seen&location_type=0&nwlat=38.15&selat=37.75&nwlng=-108.05&selng=-107.20" \
            -o data/purpleair.json
          echo "Fetched $(jq '.data | length' data/purpleair.json) sensors"

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/purpleair.json
          git diff --cached --quiet || git commit -m "chore: update PurpleAir data [skip ci]"
          git push
