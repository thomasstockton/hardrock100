- name: Push data/purpleair.json via GitHub API
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  run: |
    CONTENT=$(base64 -w 0 data/purpleair.json)
    # Get current file SHA (needed for updates; empty string for first create)
    FILE_SHA=$(curl -s \
      -H "Authorization: token $GITHUB_TOKEN" \
      "https://api.github.com/repos/${{ github.repository }}/contents/data/purpleair.json" \
      | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha','') if 'sha' in d else '')" 2>/dev/null || echo "")

    # Build JSON body
    if [ -n "$FILE_SHA" ]; then
      BODY=$(python3 -c "import json,sys; print(json.dumps({'message':'chore: update PurpleAir data [skip ci]','content':sys.argv[1],'sha':sys.argv[2]}))" "$CONTENT" "$FILE_SHA")
    else
      BODY=$(python3 -c "import json,sys; print(json.dumps({'message':'chore: update PurpleAir data [skip ci]','content':sys.argv[1]}))" "$CONTENT")
    fi

    curl -s -X PUT \
      -H "Authorization: token $GITHUB_TOKEN" \
      -H "Content-Type: application/json" \
      "https://api.github.com/repos/${{ github.repository }}/contents/data/purpleair.json" \
      -d "$BODY"
    echo "Done."
